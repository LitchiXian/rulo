user www-data;
worker_processes auto;
worker_cpu_affinity auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /var/log/nginx/access.log;

    gzip on;

    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    server {
        listen 80;
        server_name CHANGE_ME_YOUR_DOMAIN CHANGE_ME_YOUR_SERVER_IP;

        root /opt/rulo/client;

        # 前端路由 - Vue history 模式
        location / {
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # 后端 API 代理 → rulo-api (NodePort 30130)
        location /api/ {
            proxy_pass http://127.0.0.1:30130/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 75s;
            proxy_read_timeout 600s;
        }

        # 文件存储代理 → RustFS (NodePort 30090)
        # Host 必须与后端生成预签名 URL 所用的 endpoint 一致，否则签名校验失败
        location /storage/ {
            proxy_pass http://127.0.0.1:30090/;
            proxy_set_header Host rustfs-service:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 75s;
            proxy_read_timeout 600s;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}
